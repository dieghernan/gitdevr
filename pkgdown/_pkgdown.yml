url: 'https://dieghernan.github.io/gitdevr'

template:
  bootstrap: 5
  package: gitdevr

development:
  mode: auto

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, packages, twitter, github, donate, lightswitch]
  components:
    packages:
      text: "Packages"
      menu:
      - text: "tidyterra"
        href: https://dieghernan.github.io/tidyterra/
      - text: "arcgeocoder"
        href: https://dieghernan.github.io/arcgeocoder/
      - text: "igoR"
        href: https://dieghernan.github.io/igoR/
      - text: "nominatimlite"
        href: https://dieghernan.github.io/nominatimlite/
      - text: "rasterpic"
        href: https://dieghernan.github.io/rasterpic/
      - text: "pkgdev"
        href: https://dieghernan.github.io/pkgdev/
      - text: "resmush"
        href: https://dieghernan.github.io/resmush/
      - text: "geobounds"
        href: https://dieghernan.github.io/geobounds/
      - text: "rstudiothemes"
        href: https://dieghernan.github.io/rstudiothemes/
    twitter:
      icon: fa-brands fa-x-twitter
      href: https://x.com/dhernangomez
      aria-label: X (formerly Twitter)
    donate:
      icon: fa-hand-holding-dollar
      href: https://ko-fi.com/dieghernan
      aria-label: Buy me a coffee

reference:
- title: Console helpers
  desc: >
    Small helpers for checking console output rendering in the template.
  contents:
  - has_concept("console")

- title: About the package
  desc: Package overview and metadata.
- contents:
  - gitdevr-package

articles:
- title: Precomputed articles
  navbar: Precomputed
  desc: >
    Articles used to check precomputed R Markdown and Quarto output.
  contents:
  - starts_with("precompute")
- title: Menu examples
  navbar: Menu bar
  desc: >
    Articles used to test dropdown menus in the article navbar.
  contents:
  - starts_with("menu")
- title: Feature tests
  desc: >
    These articles are used to test **pkgdown** features that cannot easily be
    tested automatically.
  contents:
  - starts_with("test")
